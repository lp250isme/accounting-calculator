<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#f2f2f7" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>分帳計算器</title>

        <link rel="icon" href="/favicon.ico" sizes="48x48" />
        <link rel="icon" type="image/png" href="/icon.png" media="(prefers-color-scheme: light)" />
        <link rel="icon" type="image/png" href="/icon-dark.png" media="(prefers-color-scheme: dark)" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap"
        />

        <!-- 首屏前解析主題，避免閃爍；kit 的玻璃材質靠 data-theme 切深淺 -->
        <script>
            try {
                var p = localStorage.getItem('acc-theme') || 'auto';
                var d =
                    p === 'dark' ||
                    (p === 'auto' &&
                        matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.dataset.theme = d ? 'dark' : 'light';
            } catch (e) {}
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
